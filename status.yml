- name: Show interface status on Catalyst
  hosts: switches
  gather_facts: no
  connection: network_cli
  tasks:
    - name: Run show interface status
      cisco.ios.ios_command:
        commands:
          - show interface status
      register: interface_status

    - name: Print output        # ← 이거 추가
      debug:
        var: interface_status.stdout_lines
